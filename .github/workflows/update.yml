name: Actualizar IPTV

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar lista
        run: curl -L https://iptv-org.github.io/iptv/index.m3u -o lista.m3u
      
      - name: Subir a Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: d3e9910463b3599c1f4654d95a05907b
        run: |
          curl -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/gists/$GIST_ID \
            -d @- <<EOF
          {
            "files": {
              "lista.m3u": {
                "content": $(jq -Rs . < lista.m3u)
              }
            }
          }
          EOF
